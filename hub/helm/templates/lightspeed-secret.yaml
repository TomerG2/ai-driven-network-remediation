{{- if and .Values.agentService.lightspeed.url (not .Values.agentService.lightspeed.token) }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: noc-lightspeed-client
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hub.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: noc-lightspeed-client-{{ .Release.Namespace }}
  labels:
    {{- include "hub.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: lightspeed-operator-query-access
subjects:
  - kind: ServiceAccount
    name: noc-lightspeed-client
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: Secret
metadata:
  name: noc-lightspeed-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hub.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/service-account.name: noc-lightspeed-client
type: kubernetes.io/service-account-token
{{- else if .Values.agentService.lightspeed.token }}
---
apiVersion: v1
kind: Secret
metadata:
  name: noc-lightspeed-secret
  labels:
    {{- include "hub.labels" . | nindent 4 }}
type: Opaque
data:
  LIGHTSPEED_TOKEN: {{ .Values.agentService.lightspeed.token | b64enc | quote }}
{{- end }}
